name: Run Playwright Tests

on:
  push:
    branches:
      - qa
      - playwright-gha-test
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QA_USERNAME: ${{ secrets.QA_USERNAME }}
      QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
      SIERRA_KEY: ${{ secrets.SIERRA_KEY }}
      SIERRA_SECRET: ${{ secrets.SIERRA_SECRET }}
      SIERRA_BASE: ${{ secrets.SIERRA_BASE }}
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install
      - name: Build
        run: npm run build
      - name: Run Playwright tests
        run: npx playwright test --project=chromium --reporter=list,github,html --workers=1
